name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths: [infra/**]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.10.0"
  WORKING_DIR: infra/

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # WIF auth for GCS Terraform state (same pool + SA as the chatbot repo)
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_backend_api_key: ${{ secrets.BACKEND_API_KEY }}

      - name: Comment plan on PR
        uses: actions/github-script@v9
        with:
          script: |
            const output = [
              "## Terraform Plan — frontend infra",
              "```",
              `${{ steps.plan.outputs.stdout }}`,
              "```",
              "",
              `**Exit code:** ${{ steps.plan.outcome }}`,
            ].join("\n");
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

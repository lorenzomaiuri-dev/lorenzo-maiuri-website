name: Deploy Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Build & Deploy Preview Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (OpenNext + Cloudflare)
        run: npx opennextjs-cloudflare build

      - name: Deploy preview Worker
        id: deploy
        run: |
          OUTPUT=$(npx wrangler deploy --name lorenzo-maiuri-website-preview 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"
          # Extract workers.dev URL from wrangler output
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^ ]+workers\.dev' | head -1)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set BACKEND_API_KEY on preview Worker
        run: |
          OUTPUT_SECRET=$(echo "$BACKEND_API_KEY" | npx wrangler secret put BACKEND_API_KEY --name lorenzo-maiuri-website-preview 2>&1) || { echo "$OUTPUT_SECRET"; exit 1; }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const url = "${{ steps.deploy.outputs.preview_url }}" ||
              `https://lorenzo-maiuri-website-preview.${{ vars.CF_WORKERS_SUBDOMAIN }}.workers.dev`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## Preview deployed",
                "",
                `**URL**: ${url}`,
                `**Commit**: \`${context.sha.slice(0, 7)}\``,
                "",
                "> This preview is shared across all open PRs — it reflects the latest deployed PR.",
              ].join("\n"),
            });
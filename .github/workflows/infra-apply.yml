name: Terraform Apply

on:
  push:
    branches: [main]
    paths: [infra/**]

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.10.0"
  WORKING_DIR: infra/

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: infrastructure  # requires manual approval in repo settings

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_backend_api_key: ${{ secrets.BACKEND_API_KEY }}
